<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج تقديم طلب الامتحان البديل</title>
    <!-- استيراد خطوط جوجل (Tajawal) لدعم اللغة العربية بشكل جميل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- استيراد Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }

        /* تأثيرات التحميل للزر */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center py-10 px-4 sm:px-6 lg:px-8">

    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg p-8">

        <!-- الترويسة -->
        <div class="flex items-center border-b pb-6 mb-6 gap-4">
            <div class="flex-shrink-0">
                <img src="fcsitlogo.png" alt="شعار الكلية" class="h-20 w-auto object-contain">
            </div>
            <div class="text-right">
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">نموذج تقديم طلب الامتحان البديل</h1>
                <p class="text-sm text-gray-500 mt-2">يرجى تعبئة كافة البيانات المطلوبة لتقديم الطلب.</p>
            </div>
        </div>

        <!-- رسائل النجاح أو الخطأ -->
        <div id="alertBox" class="hidden mb-6 p-4 rounded-md"></div>

        <!-- نموذج الاستبيان -->
        <form id="examForm" class="space-y-6">

            <!-- حقل الاسم ونوع المتقدم -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <label for="studentName" class="block text-sm font-bold text-gray-700 mb-2">الاسم الرباعي <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="studentName" name="studentName" required placeholder="أدخل اسمك الكامل"
                        class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="gender" class="block text-sm font-bold text-gray-700 mb-2">نوع المتقدم <span
                            class="text-red-500">*</span></label>
                    <select id="gender" name="gender" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-white">
                        <option value="" disabled selected>اختر النوع...</option>
                        <option value="طالب">طالب</option>
                        <option value="طالبة">طالبة</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- حقل الرقم الجامعي -->
                <div>
                    <label for="universityId" class="block text-sm font-bold text-gray-700 mb-2">الرقم الجامعي <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="universityId" name="universityId" required placeholder="مثال: 44100000"
                        class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- حقل الرقم الوطني -->
                <div>
                    <label for="nationalId" class="block text-sm font-bold text-gray-700 mb-2">الرقم الوطني <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="nationalId" name="nationalId" required placeholder="أدخل رقمك الوطني"
                        class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- حقل القسم -->
                <div>
                    <label for="department" class="block text-sm font-bold text-gray-700 mb-2">القسم <span
                            class="text-red-500">*</span></label>
                    <select id="department" name="department" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-white">
                        <option value="" disabled selected>اختر القسم...</option>
                        <option value="علوم الحاسوب">علوم الحاسوب</option>
                        <option value="نظم المعلومات">نظم المعلومات</option>
                        <option value="تقانة المعلومات">تقانة المعلومات</option>
                    </select>
                </div>

                <!-- حقل الفرقة -->
                <div>
                    <label for="level" class="block text-sm font-bold text-gray-700 mb-2">الفرقة <span
                            class="text-red-500">*</span></label>
                    <select id="level" name="level" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-white">
                        <option value="" disabled selected>اختر الفرقة...</option>
                        <option value="الأولى">الأولى</option>
                        <option value="الثانية">الثانية</option>
                        <option value="الثالثة">الثالثة</option>
                        <option value="الرابعة">الرابعة</option>
                        <option value="الخامسة">الخامسة</option>
                    </select>
                </div>
            </div>

            <!-- المواد البديلة -->
            <div>
                <label for="subjects" class="block text-sm font-bold text-gray-700 mb-2">المادة او المواد التي سيتم
                    أخذها كبديل <span class="text-red-500">*</span></label>
                <select id="subjects" name="subjects" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-white">
                    <option value="" disabled selected>اختر المواد...</option>
                    <option value="جميع مواد الفصل الاول">جميع مواد الفصل الاول</option>
                    <option value="جميع مواد الفصل الثاني">جميع مواد الفصل الثاني</option>
                    <option value="مواد الفصلين معا">مواد الفصلين معا</option>
                    <option value="مادة او اكثر">مادة او أكثر</option>
                </select>
            </div>

            <!-- حقل اسم المادة (يظهر فقط عند اختيار مادة او اكثر) -->
            <div id="specificSubjectsSection" class="hidden mt-4">
                <label for="specificSubjectsInput" class="block text-sm font-bold text-gray-700 mb-2">اسم المادة /
                    المواد <span class="text-red-500">*</span></label>
                <input type="text" id="specificSubjectsInput" name="specificSubjectsInput"
                    placeholder="أدخل أسماء المواد هنا..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- التنويه والمستندات (تظهر وتصبح إجبارية فقط عند اختيار "مواد الفصلين معا") -->
            <div id="notesSection" class="hidden bg-blue-50 p-5 rounded-md border border-blue-100">
                <div class="flex items-start mb-4">
                    <svg class="h-6 w-6 text-blue-600 mt-0.5 ml-2 flex-shrink-0" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-sm text-blue-800 font-medium leading-relaxed">
                        <span class="font-bold text-blue-900">تنويه:</span> لقد اخترت (مواد الفصلين معاً). يجب عليك
                        إرفاق المستندات المطلوبة (طبية او غيرها) أو وصف الحالة كتابةً في الحقل أدناه.
                    </p>
                </div>

                <label for="notes" class="block text-sm font-bold text-gray-700 mb-2">ملاحظة <span
                        class="text-red-500">*</span></label>
                <textarea id="notes" name="notes" rows="4" placeholder="اكتب وصف الحالة هنا..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <!-- حقل المرفقات -->
            <div class="bg-white p-5 rounded-md border border-gray-200 shadow-sm">
                <label for="fileUpload" class="block text-sm font-bold text-gray-700 mb-2">إرفاق عذر طبي أو مستندات
                    (اختياري)</label>
                <input type="file" id="fileUpload" name="fileUpload" accept="image/*,.pdf,.doc,.docx"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-gray-50 cursor-pointer">
                <p class="text-xs text-gray-500 mt-2">يمكنك إرفاق ملف (صورة، PDF، أو مستند) ليتم حفظه تلقائياً في Google
                    Drive.</p>
            </div>

            <!-- زر الإرسال -->
            <div class="pt-4">
                <button type="submit" id="submitBtn"
                    class="w-full flex items-center justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-base font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                    <span id="btnText">إرسال الطلب</span>
                    <div id="btnLoader" class="loader mr-3"></div>
                </button>
            </div>
        </form>

    </div>

    <script>
        // --- إعدادات Google Sheets ---
        // ضع الرابط الخاص بـ Web App (Google Apps Script) هنا بعد نشره
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCFxgLWrb2q-XkNML1lNXla_Zfo6nLFoS3fH_KOpCqsYa-pgTAhjkMB7hon81uo7vB3w/exec';

        /* -------------------------------------------------------------
        كود Google Apps Script المطلوب وضعه في ملف Google Sheets الخاص بك:
        1. افتح ملف Google Sheets جديد
        2. الإضافات (Extensions) > برمجة تطبيقات Google (Apps Script)
        3. انسخ الكود التالي والصقه:

        function doPost(e) {
            try {
                // فك تشفير البيانات القادمة
                var dataObj = JSON.parse(e.postData.contents);
                var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
                var fileUrl = "لا يوجد مرفق";
                
                // معالجة الملف المرفق وحفظه في Google Drive داخل مجلد fcsitsickleave
                if (dataObj.fileBase64 && dataObj.fileName) {
                    var folder;
                    var folders = DriveApp.getFoldersByName("fcsitsickleave");
                    if (folders.hasNext()) {
                        folder = folders.next();
                    } else {
                        // إذا لم يتم العثور على المجلد بالاسم، يتم إنشاؤه أو الحفظ في المجلد الرئيسي
                        folder = DriveApp.getRootFolder();
                    }
                    var blob = Utilities.newBlob(Utilities.base64Decode(dataObj.fileBase64), dataObj.mimeType, dataObj.fileName);
                    var file = folder.createFile(blob);
                    fileUrl = file.getUrl(); // رابط الملف
                }

                // تحديد المادة (هل هي محددة من القائمة أم مكتوبة يدوياً)
                var finalSubject = dataObj.subjects === 'مادة او اكثر' ? dataObj.specificSubjects : dataObj.subjects;

                var data = [
                    new Date(), // Timestamp
                    dataObj.studentName,
                    dataObj.gender, // نوع المتقدم (طالب / طالبة)
                    dataObj.universityId,
                    dataObj.nationalId,
                    dataObj.department,
                    dataObj.level,
                    finalSubject,
                    dataObj.notes || "",
                    fileUrl
                ];
                sheet.appendRow(data);
                return ContentService.createTextOutput(JSON.stringify({"result":"success"})).setMimeType(ContentService.MimeType.JSON);
            } catch(error) {
                return ContentService.createTextOutput(JSON.stringify({"result":"error", "error": error.message})).setMimeType(ContentService.MimeType.JSON);
            }
        }
        
        4. اضغط على "نشر" (Deploy) > "نشر جديد" (New deployment)
        5. اختر النوع "تطبيق ويب" (Web app)
        6. إمكانية الوصول: "أنا فقط" (أو أي شخص إذا أردت) ومن يمكنه الدخول: "أي شخص" (Anyone)
        7. انسخ رابط تطبيق الويب والصقه في متغير SCRIPT_URL بالأعلى.
        -------------------------------------------------------------
        */

        const form = document.getElementById('examForm');
        const subjectsSelect = document.getElementById('subjects');
        const specificSubjectsSection = document.getElementById('specificSubjectsSection');
        const specificSubjectsInput = document.getElementById('specificSubjectsInput');
        const notesSection = document.getElementById('notesSection');
        const notesInput = document.getElementById('notes');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const alertBox = document.getElementById('alertBox');

        // منطق إظهار حقل الملاحظات الإجباري
        subjectsSelect.addEventListener('change', function () {
            // معالجة تنويه الفصلين معاً
            if (this.value === 'مواد الفصلين معا') {
                notesSection.classList.remove('hidden');
                notesInput.setAttribute('required', 'required');
            } else {
                notesSection.classList.add('hidden');
                notesInput.removeAttribute('required');
                notesInput.value = ''; // تصفير الحقل إذا تراجع عن الاختيار
            }

            // معالجة اختيار مادة أو أكثر
            if (this.value === 'مادة او اكثر') {
                specificSubjectsSection.classList.remove('hidden');
                specificSubjectsInput.setAttribute('required', 'required');
            } else {
                specificSubjectsSection.classList.add('hidden');
                specificSubjectsInput.removeAttribute('required');
                specificSubjectsInput.value = '';
            }
        });

        // رسائل التنبيه
        function showAlert(message, type) {
            alertBox.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            if (type === 'success') {
                alertBox.classList.add('bg-green-100', 'text-green-800');
            } else {
                alertBox.classList.add('bg-red-100', 'text-red-800');
            }
            alertBox.innerHTML = `<p class="font-bold">${message}</p>`;
        }

        // معالجة إرسال النموذج
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            // تغيير حالة الزر إلى جاري الإرسال
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = 'جاري الإرسال...';
            btnLoader.style.display = 'inline-block';
            alertBox.classList.add('hidden');

            // قراءة الملف إذا وجد وتحويله إلى Base64 للإرسال لـ Google Script
            const fileInput = document.getElementById('fileUpload');
            let fileBase64 = '';
            let fileName = '';
            let mimeType = '';

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName = file.name;
                mimeType = file.type;

                const reader = new FileReader();
                reader.onload = function (event) {
                    fileBase64 = event.target.result.split(',')[1]; // استخراج الكود فقط
                    sendDataToGAS(fileBase64, fileName, mimeType);
                };
                reader.readAsDataURL(file);
            } else {
                sendDataToGAS('', '', '');
            }
        });

        function sendDataToGAS(fileBase64, fileName, mimeType) {
            // تجهيز البيانات ككائن JSON
            const payload = {
                studentName: document.getElementById('studentName').value,
                gender: document.getElementById('gender').value,
                universityId: document.getElementById('universityId').value,
                nationalId: document.getElementById('nationalId').value,
                department: document.getElementById('department').value,
                level: document.getElementById('level').value,
                subjects: document.getElementById('subjects').value,
                specificSubjects: document.getElementById('specificSubjectsInput') ? document.getElementById('specificSubjectsInput').value : '',
                notes: document.getElementById('notes').value,
                fileBase64: fileBase64,
                fileName: fileName,
                mimeType: mimeType
            };

            // إذا لم يتم وضع رابط السكريبت الحقيقي، نقوم بعمل محاكاة للإرسال (للتجربة)
            if (SCRIPT_URL === 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE') {
                setTimeout(() => {
                    showAlert('تم إرسال الطلب بنجاح! (تمت المحاكاة - تأكد من ربط Google Script لحفظ البيانات والملفات)', 'success');
                    form.reset();
                    notesSection.classList.add('hidden');
                    if (specificSubjectsSection) specificSubjectsSection.classList.add('hidden');
                    resetButton();
                }, 2000);
                return;
            }

            // الإرسال الفعلي لـ Google Sheets (بصيغة JSON كنص لتفادي CORS في GAS)
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.result === "success") {
                        showAlert('تم إرسال طلبك ومرفقاتك بنجاح. شكراً لك.', 'success');
                        form.reset();
                        notesSection.classList.add('hidden');
                        if (specificSubjectsSection) specificSubjectsSection.classList.add('hidden');
                    } else {
                        showAlert('حدث خطأ أثناء الإرسال: ' + (data.error || ''), 'error');
                    }
                })
                .catch(error => {
                    console.error('Error!', error);
                    showAlert('حدث خطأ في الاتصال. تأكد من إعداد رابط Google Apps Script بشكل صحيح.', 'error');
                })
                .finally(() => {
                    resetButton();
                });
        }

        // إعادة الزر لشكله الطبيعي
        function resetButton() {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            btnText.textContent = 'إرسال الطلب';
            btnLoader.style.display = 'none';
        }
    </script>
</body>

</html>
